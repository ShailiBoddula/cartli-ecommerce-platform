# Application Name
spring.application.name=CartLi

# Server Port (Render provides PORT env variable)
server.port=${PORT:8080}

# Database Configuration (using Render PostgreSQL)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce_youtube}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:210039}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logging (less verbose in production)
logging.level.org.springframework WARN
logging.level.org.hibernate WARN

# Razorpay Payment Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_1234567890}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:1234567890abcdef}

# JWT Secret (IMPORTANT: Change this in production!)
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-here-make-it-long-and-secure}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=true
